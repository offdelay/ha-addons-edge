<!DOCTYPE html>
<html>
<head>
<style>
.confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 9999; }
.confetti { position: absolute; width: 10px; height: 10px; background: #f00; border-radius: 2px; opacity: 0; }
.confetti.burst { top: 50%; left: 50%; animation: confetti-burst forwards; }
.confetti.circle { border-radius: 50%; }
.confetti.triangle { width: 0; height: 0; background: transparent !important; border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 10px solid #f00; }
@keyframes confetti-burst {
  0% { opacity: 1; transform: translate(0, 0) scale(0) rotate(0deg); animation-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  30% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(var(--s)) rotate(calc(var(--tr) * 0.4)); animation-timing-function: cubic-bezier(0.55, 0.085, 0.68, 0.53); }
  100% { opacity: 0; transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) + 800px)) rotate(var(--tr)) scale(var(--s)); }
}
</style>
</head>
<body style="background: black;">
<div id="confettiContainer" class="confetti-container" style="display: block;"></div>
<button onclick="triggerConfettiBurst()" style="position:relative; z-index:99999;">Burst</button>
<script>
const CONFETTI_SHAPES = ['square', 'circle', 'triangle'];
const CONFETTI_COLORS = ['#ff4b4b', '#48b84b', '#4b4bff', '#ffff4b', '#ff4bff', '#4bffff'];
function triggerConfettiBurst() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const burstCount = 150;
  for (let i = 0; i < burstCount; i++) {
    const p = document.createElement('div');
    const shape = CONFETTI_SHAPES[Math.floor(Math.random() * CONFETTI_SHAPES.length)];
    p.className = `confetti burst ${shape}`;
    const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    if (shape === 'triangle') p.style.borderBottomColor = color;
    else p.style.backgroundColor = color;
    const tx = (Math.random() - 0.5) * 800;
    const ty = -100 - (Math.random() * 500);
    const tr = (Math.random() - 0.5) * 1000;
    const scale = 0.5 + Math.random();
    p.style.setProperty('--tx', `${tx}px`);
    p.style.setProperty('--ty', `${ty}px`);
    p.style.setProperty('--tr', `${tr}deg`);
    p.style.setProperty('--s', scale);
    const baseSize = 8 + Math.random() * 6;
    if (shape === 'triangle') {
      p.style.borderBottomWidth = (baseSize + 5) + 'px';
      p.style.borderLeftWidth = (baseSize/2) + 'px';
      p.style.borderRightWidth = (baseSize/2) + 'px';
    } else {
      p.style.width = baseSize + 'px';
      p.style.height = baseSize + 'px';
    }
    p.style.animationDuration = (1.2 + Math.random() * 1.5) + 's';
    p.style.animationDelay = (Math.random() * 0.1) + 's';
    p.style.left = '50%';
    p.style.top = '50%';
    container.appendChild(p);
  }
}
</script>
</body>
</html>
